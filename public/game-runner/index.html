<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>GameCraft Runner</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0d12;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #game-canvas-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-canvas-container canvas {
        max-width: 100%;
        max-height: 100%;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        letter-spacing: 0.02em;
      }
      #boot.error {
        color: #ff8a8a;
        padding: 24px;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="boot">Loading engine…</div>
    <div id="game-canvas-container"></div>

    <!-- Phaser 3 from CDN. The runner posts ENGINE_ERROR to the parent if it
         fails to load so the builder can surface a useful message. -->
    <script
      src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"
      onload="window.__phaserLoaded = true"
      onerror="window.__onPhaserLoadError && window.__onPhaserLoadError()"
    ></script>
    <script src="./engine.js"></script>
  </body>
</html>
