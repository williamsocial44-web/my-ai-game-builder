<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Empire</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(circle at 30% 15%, #3a2418, #160c06 72%);
    color: #f4e9d8; min-height: 100%; display: flex; flex-direction: column; align-items: center;
    padding: 20px; gap: 14px; user-select: none;
  }
  h1 { font-size: 30px; color: #ffcf6b; text-shadow: 0 2px 10px rgba(255,170,40,.5); letter-spacing: 1px; }
  .count { font-size: 38px; font-weight: 800; color: #fff5e0; }
  .cps { color: #d8b98a; font-size: 15px; margin-top: -6px; }
  .layout { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; align-items: flex-start; width: 100%; max-width: 760px; margin-top: 6px; }
  .cookie-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cookie {
    font-size: 130px; cursor: pointer; line-height: 1; background: none; border: none; padding: 0;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,.5)); transition: transform .06s;
  }
  .cookie:hover { transform: scale(1.03); }
  .cookie:active { transform: scale(.9); }
  .hint { font-size: 13px; color: #bfa37e; }
  .shop { flex: 1; min-width: 290px; display: flex; flex-direction: column; gap: 10px; }
  .shop h2 { font-size: 15px; color: #ffcf6b; letter-spacing: 1px; text-transform: uppercase; }
  .up {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,200,120,.18);
    border-radius: 12px; padding: 12px 14px; cursor: pointer; text-align: left; color: inherit; font: inherit;
    transition: .12s;
  }
  .up:hover:not(:disabled) { background: rgba(255,255,255,.1); border-color: rgba(255,200,120,.4); }
  .up:disabled { opacity: .42; cursor: not-allowed; }
  .up .name { font-weight: 700; }
  .up .desc { font-size: 12px; color: #cdb085; }
  .up .right { text-align: right; white-space: nowrap; }
  .up .cost { color: #ffd98a; font-weight: 700; }
  .up .owned { font-size: 12px; color: #9c876a; }
  .reset { background: transparent; border: 1px solid #7a5a3a; color: #d8b98a; padding: 8px 16px; border-radius: 8px; cursor: pointer; font: inherit; }
  .reset:hover { background: #7a5a3a; color: #160c06; }
  .floaties { position: fixed; pointer-events: none; inset: 0; overflow: hidden; }
  .float { position: absolute; color: #fff2cf; font-weight: 800; animation: rise 1s ease-out forwards; }
  @keyframes rise { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-60px); } }
</style>
</head>
<body>
  <h1>🍪 Cookie Empire</h1>
  <div class="count" id="count">0 cookies</div>
  <div class="cps" id="cps">0 per second</div>
  <div class="layout">
    <div class="cookie-area">
      <button class="cookie" id="cookie">🍪</button>
      <div class="hint">Click the cookie to bake!</div>
      <button class="reset" id="reset">Reset</button>
    </div>
    <div class="shop" id="shop"><h2>Upgrades</h2></div>
  </div>
  <div class="floaties" id="floaties"></div>

<script>
(function(){
  let cookies = 0, perClick = 1;
  const upgrades = [
    { id:'cursor',  name:'Cursor',  icon:'👆', baseCost:15,    cps:0.2, owned:0 },
    { id:'grandma', name:'Grandma', icon:'👵', baseCost:100,   cps:1,   owned:0 },
    { id:'oven',    name:'Oven',    icon:'🔥', baseCost:550,   cps:5,   owned:0 },
    { id:'factory', name:'Factory', icon:'🏭', baseCost:3000,  cps:25,  owned:0 },
    { id:'bank',    name:'Bank',    icon:'🏦', baseCost:14000, cps:120, owned:0 },
  ];
  const clickUp = { id:'click', name:'Golden Finger', icon:'✨', baseCost:200, owned:0 };

  const countEl = document.getElementById('count');
  const cpsEl = document.getElementById('cps');
  const shop = document.getElementById('shop');
  const cookieBtn = document.getElementById('cookie');
  const floaties = document.getElementById('floaties');

  function fmt(n){
    if (n < 1000) { const r = Math.floor(n*10)/10; return (r % 1 === 0 ? r.toFixed(0) : r.toFixed(1)); }
    const units = ['K','M','B','T','Qa','Qi']; let u = -1, v = n;
    while (v >= 1000 && u < units.length-1){ v /= 1000; u++; }
    return v.toFixed(2) + units[u];
  }
  function cost(u){ return Math.ceil(u.baseCost * Math.pow(1.15, u.owned)); }
  function totalCps(){ return upgrades.reduce((a,u) => a + u.cps*u.owned, 0); }

  function addRow(u, descFn, isClick){
    const b = document.createElement('button');
    b.className = 'up'; b.dataset.id = u.id;
    b.innerHTML =
      '<div><div class="name">' + u.icon + ' ' + u.name + '</div>' +
      '<div class="desc">' + descFn() + '</div></div>' +
      '<div class="right"><div class="cost">🍪 ' + fmt(cost(u)) + '</div>' +
      '<div class="owned">owned: ' + u.owned + '</div></div>';
    b.addEventListener('click', () => buy(u, isClick));
    shop.appendChild(b);
  }

  function buildShop(){
    shop.innerHTML = '<h2>Upgrades</h2>';
    addRow(clickUp, () => '+' + (clickUp.owned + 1) + ' per click', true);
    upgrades.forEach(u => addRow(u, () => '+' + u.cps + ' / sec', false));
  }

  function buy(u, isClick){
    const c = cost(u);
    if (cookies < c) return;
    cookies -= c; u.owned++;
    if (isClick) perClick = 1 + clickUp.owned;
    buildShop(); refresh();
  }

  function refresh(){
    countEl.textContent = fmt(cookies) + ' cookies';
    cpsEl.textContent = fmt(totalCps()) + ' per second';
    document.querySelectorAll('.up').forEach(b => {
      const id = b.dataset.id;
      const u = id === 'click' ? clickUp : upgrades.find(x => x.id === id);
      b.disabled = cookies < cost(u);
    });
  }

  function floatText(x, y, txt){
    const el = document.createElement('div');
    el.className = 'float'; el.textContent = txt;
    el.style.left = (x - 10) + 'px'; el.style.top = (y - 20) + 'px';
    floaties.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  cookieBtn.addEventListener('click', (e) => {
    cookies += perClick;
    floatText(e.clientX, e.clientY, '+' + fmt(perClick));
    refresh();
  });
  document.getElementById('reset').addEventListener('click', () => {
    cookies = 0; perClick = 1; upgrades.forEach(u => u.owned = 0); clickUp.owned = 0;
    buildShop(); refresh();
  });

  let lastT = performance.now();
  function tick(t){
    const dt = (t - lastT) / 1000; lastT = t;
    cookies += totalCps() * dt;
    refresh();
    requestAnimationFrame(tick);
  }

  buildShop(); refresh();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
