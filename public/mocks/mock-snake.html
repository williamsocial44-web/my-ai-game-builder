<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #05060a;
    color: #e6f7ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%; gap: 14px; padding: 16px; user-select: none;
  }
  h1 {
    font-size: 28px; letter-spacing: 3px; text-transform: uppercase;
    color: #39ff14; text-shadow: 0 0 8px #39ff14, 0 0 18px #1bd60d;
  }
  .hud { display: flex; gap: 28px; font-size: 15px; letter-spacing: 1px; }
  .hud .val { color: #00eaff; text-shadow: 0 0 8px #00eaff; font-weight: 700; }
  .wrap { position: relative; }
  canvas {
    background: #0a0d16; border: 2px solid #14304a; border-radius: 10px;
    box-shadow: 0 0 24px rgba(0,234,255,.25), inset 0 0 30px rgba(0,234,255,.05);
  }
  .controls { font-size: 13px; color: #6b86a3; letter-spacing: .5px; text-align: center; }
  .controls b { color: #9fe0ff; }
  .overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    background: rgba(5,6,10,.82); border-radius: 10px; backdrop-filter: blur(2px);
  }
  .overlay.show { display: flex; }
  .overlay h2 { color: #ff2d95; text-shadow: 0 0 12px #ff2d95; font-size: 30px; letter-spacing: 2px; }
  .overlay p { color: #cfe9ff; }
  button {
    font: inherit; cursor: pointer; padding: 10px 22px; border-radius: 8px;
    border: 1px solid #39ff14; background: transparent; color: #39ff14;
    text-shadow: 0 0 6px #39ff14; letter-spacing: 1px; transition: .15s;
  }
  button:hover { background: #39ff14; color: #05060a; text-shadow: none; box-shadow: 0 0 18px #39ff14; }
</style>
</head>
<body>
  <h1>Neon Snake</h1>
  <div class="hud">
    <div>Score <span class="val" id="score">0</span></div>
    <div>Best <span class="val" id="best">0</span></div>
  </div>
  <div class="wrap">
    <canvas id="game" width="420" height="420"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overTitle">Game Over</h2>
      <p id="overMsg">Score: 0</p>
      <button id="restart">Play Again</button>
    </div>
  </div>
  <div class="controls">Move with <b>Arrow Keys</b> or <b>WASD</b> &nbsp;·&nbsp; <b>Space</b> to pause &nbsp;·&nbsp; <b>R</b> to restart</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 21, CELL = canvas.width / GRID;
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg = document.getElementById('overMsg');
  const restartBtn = document.getElementById('restart');

  let snake, dir, nextDir, food, score, best = 0, speed, acc, last, running, paused, dead;
  let audioCtx;

  function beep(freq, dur){
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'square'; o.frequency.value = freq; o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(.06, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.0001, audioCtx.currentTime + dur);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch (e) {}
  }

  function reset(){
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    score = 0; speed = 130; acc = 0; last = 0;
    running = true; paused = false; dead = false;
    placeFood();
    scoreEl.textContent = '0';
    overlay.classList.remove('show');
  }

  function placeFood(){
    while (true){
      const f = { x: (Math.random()*GRID)|0, y: (Math.random()*GRID)|0 };
      if (!snake.some(s => s.x===f.x && s.y===f.y)) { food = f; return; }
    }
  }

  function gameOver(){
    dead = true; running = false;
    best = Math.max(best, score); bestEl.textContent = best;
    overTitle.textContent = 'Game Over';
    overMsg.textContent = 'Score: ' + score;
    overlay.classList.add('show');
    beep(140, .3);
  }

  function step(){
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x<0 || head.y<0 || head.x>=GRID || head.y>=GRID) return gameOver();
    if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y){
      score += 10; scoreEl.textContent = score;
      speed = Math.max(60, speed - 4);
      placeFood(); beep(660, .07);
    } else {
      snake.pop();
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = 'rgba(0,234,255,.04)'; ctx.lineWidth = 1;
    for (let i=1;i<GRID;i++){
      ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
    }
    ctx.save();
    ctx.shadowColor = '#ff2d95'; ctx.shadowBlur = 16; ctx.fillStyle = '#ff2d95';
    roundRect(food.x*CELL+3, food.y*CELL+3, CELL-6, CELL-6, 5); ctx.fill();
    ctx.restore();
    for (let i=snake.length-1;i>=0;i--){
      const s = snake[i], head = i===0;
      ctx.save();
      ctx.shadowColor = head ? '#00eaff' : '#39ff14';
      ctx.shadowBlur = head ? 18 : 10;
      ctx.fillStyle = head ? '#00eaff' : '#39ff14';
      roundRect(s.x*CELL+2, s.y*CELL+2, CELL-4, CELL-4, 5); ctx.fill();
      ctx.restore();
    }
  }

  function loop(t){
    requestAnimationFrame(loop);
    if (!running || paused){ draw(); return; }
    if (!last) last = t;
    acc += t - last; last = t;
    if (acc >= speed){ acc = 0; step(); }
    draw();
  }

  function setDir(x,y){
    if (snake.length>1 && x===-dir.x && y===-dir.y) return;
    nextDir = {x,y};
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
    if (k==='arrowup' || k==='w') setDir(0,-1);
    else if (k==='arrowdown' || k==='s') setDir(0,1);
    else if (k==='arrowleft' || k==='a') setDir(-1,0);
    else if (k==='arrowright' || k==='d') setDir(1,0);
    else if (k===' '){ if (!dead){ paused = !paused; last = 0; } }
    else if (k==='r'){ reset(); }
  });

  restartBtn.addEventListener('click', reset);

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
